# Hexo Configuration

# Site
title: Ghost-Author
subtitle: 'AI 工程、系统思考与长期主义写作'
description: 'Ghost-Author 的 IT 个人博客，记录 AI 工程实践、技术学习、系统设计和个人成长。'
author: Ghost-Author
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://ghost-author.github.io/ryuho
root: /ryuho/
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Theme
theme: minimal

# Deployment
deploy:
  type: ''

# Extensions
feed:
  type: atom
  path: atom.xml
  limit: 20
sitemap:
  path: sitemap.xml
  rel: true

# Theme custom
theme_config:
  avatar_url: /images/avatar.png
  profile_title: Ghost-Author
  profile_subtitle: '用工程化方式沉淀技术、项目经验和长期思考。'
  profile_chips:
    - 'AI 工程'
    - '工程实践'
    - '系统设计'
  mood: '当前关注：把 AI 能力变成可评测、可上线、可维护的产品功能。'
  favorites_tag: 'AI 工程'
  comments:
    enable: false
    giscus:
      repo: 'ghost-author/ryuho'
      repo_id: ''
      category: 'General'
      category_id: ''
      mapping: 'pathname'
      strict: '0'
      reactions_enabled: '1'
      emit_metadata: '0'
      input_position: 'bottom'
      theme: 'light'
      lang: 'zh-CN'
  hero_image: /images/hero.jpg
  og_image: /images/hero.jpg
  quote: '技术写作不是展示懂了什么，而是复盘如何把问题真正解决。'
  contact_email: liupggg@gmail.com
  focus_areas:
    - title: 'AI 工程'
      description: '关注 RAG、智能体、评测、提示词和 AI 产品落地路径。'
    - title: '工程实践'
      description: '记录从需求、架构、实现到上线验证的完整链路。'
    - title: '系统设计'
      description: '拆解可维护性、性能、可观测性和安全边界。'
  links:
    - name: 'GitHub Pages'
      url: 'https://ghost-author.github.io/ryuho'
    - name: 'Vercel 站点'
      url: 'https://ghost-author.github.io/ryuho'
